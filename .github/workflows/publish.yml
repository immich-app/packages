name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    if: false

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Mise
        uses: immich-app/devtools/actions/use-mise@035e80a7d4355d5f087ffb95db9e4a0944c04e56 # use-mise-action-v1.1.3

      - name: Find package
        id: find-package
        env:
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          PACKAGE_NAME="${RELEASE_TAG_NAME%-*}"
          echo "Package is $PACKAGE_NAME"
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Install
        run: pnpm --filter ./packages/${{ steps.find-package.outputs.package_name }} install

      - name: Build
        run: pnpm --filter ./packages/${{ steps.find-package.outputs.package_name }} build

      - name: Publish
        run: pnpm --filter ./packages/${{ steps.find-package.outputs.package_name }} publish --no-git-checks
